# Dingfelder Training Portal — Netlify Configuration
# This file tells Netlify how to build and serve the app.

[build]
  command     = "npm run build"
  publish     = "dist"
  environment = { NODE_VERSION = "20" }

# Critical for React Router — all paths serve index.html
# Without this, a direct URL like /h2s would 404 on Netlify
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
